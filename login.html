<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OrbitTask - Secure Sign In. Access your premium productivity dashboard and manage your tasks.">
    <title>Sign In // OrbitTask</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specialized Auth Page Layout */
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
            padding: 1.5rem;
            position: relative;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 15%;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 75%);
            pointer-events: none;
            z-index: 0;
        }

        .auth-container::after {
            content: '';
            position: absolute;
            bottom: 15%;
            right: 10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, transparent 75%);
            pointer-events: none;
            z-index: 0;
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            z-index: 1;
            animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo {
            font-size: 2.25rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--text-primary), #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .auth-form-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .auth-form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .auth-input-wrapper {
            position: relative;
        }

        .auth-input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            transition: color var(--transition-fast);
            width: 18px;
            height: 18px;
        }

        .auth-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all var(--transition-normal);
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: var(--shadow-glow);
        }

        .auth-input:focus + i {
            color: var(--primary);
        }

        .auth-error {
            display: none;
            background: var(--danger-glow);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            align-items: center;
            gap: 0.5rem;
        }

        .auth-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .auth-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            transition: color var(--transition-fast);
        }

        .auth-link:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        .btn-full {
            width: 100%;
            justify-content: center;
            padding: 0.85rem 1.5rem;
        }
    </style>
</head>
<body>

    <main class="auth-container">
        <div class="glass-panel auth-card">
            <header class="auth-header">
                <h1 class="auth-logo">OrbitTask</h1>
                <p class="auth-subtitle">Sign in to your premium dashboard</p>
            </header>

            <div class="auth-error" id="error-box">
                <i data-lucide="alert-circle"></i>
                <span id="error-message">Invalid credentials</span>
            </div>

            <form id="login-form" autocomplete="off">
                <div class="auth-form-group">
                    <label for="username">Username</label>
                    <div class="auth-input-wrapper">
                        <input type="text" id="username" class="auth-input" required placeholder="Enter username" autofocus>
                        <i data-lucide="user"></i>
                    </div>
                </div>

                <div class="auth-form-group">
                    <label for="password">Password</label>
                    <div class="auth-input-wrapper">
                        <input type="password" id="password" class="auth-input" required placeholder="••••••••">
                        <i data-lucide="lock"></i>
                    </div>
                </div>

                <button type="submit" class="btn-primary btn-full" id="login-btn">
                    <span>Sign In</span>
                    <i data-lucide="arrow-right"></i>
                </button>
            </form>

            <footer class="auth-footer">
                Don't have an account? <a href="register.html" class="auth-link">Create one</a>
            </footer>
        </div>
    </main>

    <!-- Lucide Icons and Logic -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            const form = document.getElementById('login-form');
            const errorBox = document.getElementById('error-box');
            const errorMessage = document.getElementById('error-message');
            const loginBtn = document.getElementById('login-btn');
            
            // Redirect if already logged in
            if (localStorage.getItem('token')) {
                window.location.href = 'index.html';
                return;
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorBox.style.display = 'none';

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;

                if (!username || !password) {
                    showError('Please fill out all fields');
                    return;
                }

                // Show loading state
                loginBtn.disabled = true;
                loginBtn.innerHTML = `<span>Signing In...</span>`;

                try {
                    // Check if hostname is localhost, otherwise use current origin or environment config
                    const apiBase = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
                        ? 'http://localhost:8000' 
                        : window.location.origin;

                    const response = await fetch(`${apiBase}/api/auth/login`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ username, password })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || 'Login failed');
                    }

                    // Save token and username
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.user.username);

                    // Redirect to dashboard
                    window.location.href = 'index.html';
                } catch (err) {
                    showError(err.message);
                } finally {
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = `<span>Sign In</span><i data-lucide="arrow-right"></i>`;
                    lucide.createIcons();
                }
            });

            function showError(msg) {
                errorMessage.textContent = msg;
                errorBox.style.display = 'flex';
            }
        });
    </script>
</body>
</html>
